<!DOCTYPE html>

<html>
<head>
<title>Sign In</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:white;
padding:30px;
border-radius:8px;
width:300px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ddd;
border-radius:5px;
}

button{
margin-top:15px;
width:100%;
padding:10px;
background:#2563eb;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Sign In</h2>

<form method="POST">

<input type="text" name="username" placeholder="Username">

<input type="password" name="password" placeholder="Password">

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
