<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Expense Tracker</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f4f6fb;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
background:#111827;
color:white;
padding:15px 40px;
}

.logo{
font-size:22px;
font-weight:bold;
}

.nav-links a{
color:white;
text-decoration:none;
margin-left:25px;
font-size:15px;
}

.nav-links a:hover{
color:#60a5fa;
}

/* CONTAINER */

.container{
width:85%;
margin:auto;
margin-top:40px;
}

/* CARDS */

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
margin-bottom:30px;
}

/* UPLOAD BOX */

.upload-box{
border:2px dashed #d1d5db;
padding:40px;
text-align:center;
border-radius:10px;
background:#fafafa;
}

.upload-box input{
margin-top:15px;
}

button{
margin-top:20px;
padding:10px 25px;
background:#3b82f6;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:15px;
}

button:hover{
background:#2563eb;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th, td{
padding:12px;
border-bottom:1px solid #e5e7eb;
text-align:left;
}

th{
background:#f3f4f6;
}

.amount{
color:#ef4444;
font-weight:bold;
}

/* TOTAL */

.total{
margin-top:15px;
font-size:18px;
font-weight:bold;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<div class="logo"> Expense Tracker</div>

<div class="nav-links">
<a href="#">Dashboard</a>
<a href="#">Upload CSV</a>
<a href="#">Login</a>
<a href="#">Account</a>
</div>

</div>

<div class="container">

<!-- CSV UPLOAD -->

<div class="card">

<h2>Upload SMS CSV</h2>

<div class="upload-box">

<p>Upload bank SMS CSV to automatically detect expenses</p>

<form method="POST" enctype="multipart/form-data">

<input type="file" name="sms_csv" accept=".csv">

<br>

<button type="submit">Upload & Analyze</button>

</form>

</div>

</div>

<!-- EXPENSE TABLE -->

<div class="card">

<h2>Recent Expenses</h2>

<table>

<tr>
<th>Date</th>
<th>Merchant</th>
<th>Category</th>
<th>Amount</th>
</tr>


</table>



</div>

</div>

</body>
</html>
